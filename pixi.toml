[workspace]
authors = ["parcels-benchmarks contributors"]
channels = ["conda-forge"]
name = "parcels-benchmarks"
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[tasks]

lint = "pre-commit run --all-files"
download-catalogue = { cmd = "python download-catalogue.py {{ catalogue_file }} {{ output_dir }}", args = [
  "catalogue_file",
  "output_dir",
] }

[tasks.benchmark]
cmd = "asv run"
depends-on = [
  # Downloads the datasets. The catalogue files in the scripts will live at (e.g.,) `data/parcels-examples/catalogue.yaml`
  { task = "download-catalogue", args = [
    { catalogue_file = "parcels-examples.catalogue.yaml" },
    { output_dir = "data/parcels-examples" },
  ] },
]

[dependencies]

python = "3.12.*"
asv = ">=0.6.5"
pooch = ">=1.8.2"
pre_commit = "*"
py-rattler = "0.15.*"
intake-xarray = ">=2.0.0,<3"
parcels = ">=3.1.4,<4"
ipython = ">=9.11.0,<10"
netcdf4 = ">=1.7.4,<2"

[pypi-dependencies]
parcels_benchmarks = { path = ".", editable = true }
