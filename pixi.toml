[workspace]
authors = ["parcels-benchmarks contributors"]
channels = ["conda-forge"]
name = "parcels-benchmarks"
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[tasks]

lint = "pre-commit run --all-files"
# Downloads the datasets. The catalogue file which should be used will be housed at `output_dir/catalogue_file.name`
download-catalogue = { cmd = "python scripts/download-catalogue.py {{ catalogue_file }} {{ output_dir }}", args = [
  "catalogue_file",
  "output_dir",
] }

setup-data = { depends-on = [
  { task = "download-catalogue", args = [
    { catalogue_file = "catalogues/parcels-examples/catalogue.yaml" },
    { output_dir = "surf-data/parcels-examples" },
  ] },
  { task = "download-catalogue", args = [
    { catalogue_file = "catalogues/parcels-benchmarks/catalogue.yaml" },
    { output_dir = "surf-data/parcels-benchmarks" },
  ] }
]}

[tasks.benchmark]
cmd = "asv run"
depends-on = ["setup-data"]

[dependencies]

python = "3.12.*"
asv = ">=0.6.5"
pooch = ">=1.8.2"
pre_commit = "*"
py-rattler = "0.15.*"
intake-xarray = ">=2.0.0,<3"
parcels = ">=3.1.4,<4"
ipython = ">=9.11.0,<10"
netcdf4 = ">=1.7.4,<2"
curl = "*"

[pypi-dependencies]
parcels_benchmarks = { path = ".", editable = true }
