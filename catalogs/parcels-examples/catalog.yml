# ^ Do not remove this line! Used by the download script to find the data source
plugins:
  source:
    - module: intake_xarray
sources:
  croco:
    description: CROCO_idealized
    driver: netcdf
    args:
      urlpath: "{{ CATALOG_DIR }}/data/parcels-examples/CROCOidealized_data/CROCO_idealized.nc"
      chunks: {}
      xarray_kwargs:
        engine: "netcdf4"
  DecayingMovingEddy_data:
    description: DecayingMovingEddy_data
    driver: netcdf
    args:
      urlpath: "{{ CATALOG_DIR }}/data/parcels-examples/DecayingMovingEddy_data/*.nc"
      chunks: {}
      xarray_kwargs:
        engine: "netcdf4"
  GlobCurrent_example_data:
